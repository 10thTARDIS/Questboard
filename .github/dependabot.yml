version: 2

updates:
  # Python backend
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - backend
    groups:
      # celery[redis] (via kombu) caps redis at <6.5 — must move together
      celery-redis:
        patterns:
          - "celery"
          - "redis"
          - "kombu"
      # authlib + httpx are tightly coupled for OIDC flows
      auth:
        patterns:
          - "authlib"
          - "httpx"

  # JavaScript frontend
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
    groups:
      # react and react-dom must always be on the same major version
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
      # tailwindcss v4 requires @tailwindcss/postcss at the same version
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
