name: Release

# Triggered when a version tag is pushed (e.g. v0.1.0, v1.2.3)
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Extract the section for this version from CHANGELOG.md
      # Looks for the block between "## [X.Y.Z]" and the next "## [" heading
      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"   # strip leading 'v'
          python3 - <<'PYEOF'
          import re, os, sys

          version = os.environ["VERSION"]
          with open("CHANGELOG.md") as f:
              text = f.read()

          # Find the section for this version
          pattern = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          match = re.search(pattern, text, re.DOTALL)
          if not match:
              print(f"No CHANGELOG entry found for {version}", file=sys.stderr)
              notes = f"See [CHANGELOG.md](https://github.com/${{{{ github.repository }}}}/blob/main/CHANGELOG.md) for details."
          else:
              notes = match.group(1).strip()

          # Write to $GITHUB_OUTPUT using the multiline delimiter syntax
          delimiter = "EOF_NOTES"
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"notes<<{delimiter}\n{notes}\n{delimiter}\n")
          PYEOF
        env:
          VERSION: ${{ github.ref_name }}
          # strip 'v' prefix for the CHANGELOG lookup
          VERSION: ${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # treat v1.0.0-rc1 as pre-release
