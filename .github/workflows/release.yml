name: Release

# Triggered when a version tag is pushed (e.g. v0.1.0, v1.2.3)
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Extract the section for this version from CHANGELOG.md.
      # Looks for the block between "## [X.Y.Z]" and the next "## [" heading.
      - name: Extract changelog for this version
        id: changelog
        env:
          # Pass ref name into Python via env; strip leading 'v' there.
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python3 - <<'PYEOF'
          import re, os, sys

          version = os.environ["TAG_NAME"].lstrip("v")   # "v0.1.1" → "0.1.1"
          with open("CHANGELOG.md") as f:
              text = f.read()

          # Match the section for this version up to the next "## [" heading
          pattern = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)"
          match = re.search(pattern, text, re.DOTALL)
          if not match:
              print(f"WARNING: No CHANGELOG entry found for {version}", file=sys.stderr)
              notes = "No changelog entry found for this version."
          else:
              notes = match.group(1).strip()

          # Write multiline output using the required delimiter syntax
          delimiter = "EOF_NOTES"
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"notes<<{delimiter}\n{notes}\n{delimiter}\n")
          PYEOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # e.g. v1.0.0-rc1
